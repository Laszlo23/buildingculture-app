# Production stack: build the Vite app on the host (uses .env for Vite/Alchemy/Web3.bio),
# then nginx serves dist/ and proxies /api to the API container.
#
#   export VITE_SITE_ORIGIN=https://app.buildingculture.capital
#   npm ci && npm run build:prod
#   docker compose up -d --build
#
# Binds HTTP to 127.0.0.1:8080 — put host nginx + TLS in front (see deploy/DEPLOY.md).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      API_LISTEN_HOST: "0.0.0.0"
    expose:
      - "3001"
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
